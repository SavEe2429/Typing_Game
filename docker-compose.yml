services:
  # ฐานข้อมูล MongoDB
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./Backend
    volumes:
      - ./Backend:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/keymash
      - JWT_SECRET=your_super_secret_key
      - PORT=5000
      - CHOKIDAR_USEPOLLING=true # เพิ่มบรรทัดนี้: ช่วยให้ Node.js ตรวจจับไฟล์แก้บน Windows ได้ชัวร์ขึ้น
    depends_on:
      - mongodb

  frontend:
    build: ./Frontend
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_WATCH_USEPOLLING=true # เพิ่มบรรทัดนี้: บังคับให้ Vite ตรวจเช็คไฟล์ใหม่ตลอดเวลา (แก้ปัญหาแก้โค้ดแล้วหน้าเว็บไม่รีเฟรช)
    stdin_open: true 
    tty: true # เพิ่มบรรทัดนี้: ทำงานคู่กับ stdin_open เพื่อให้ Terminal ของ Vite เสถียรขึ้น
    depends_on:
      - backend

volumes:
  mongo-data: