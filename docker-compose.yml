services:
  # ฐานข้อมูล MongoDB
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # ส่วนของ Backend
  backend:
    build: ./Backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/keymash
      - JWT_SECRET=your_super_secret_key
      - PORT=5000
    depends_on:
      - mongodb

  # ส่วนของ Frontend
  frontend:
    build: ./Frontend
    ports:
      - "5173:5173"
    stdin_open: true # เพื่อให้ Vite รับ input ได้ (แก้ปัญหาจอดำ)
    depends_on:
      - backend

volumes:
  mongo-data: